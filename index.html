<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --ink:#1c1b22; --ink-soft:#4a4853; --muted:#807d8b;
    --paper:#f7f4ee; --paper-2:#ffffff; --accent:#c0532e;
    --accent-soft:#e8a37e; --line:#e2ddd2; --shadow:rgba(28,27,34,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Hanken Grotesk',sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.6;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(var(--line) .5px,transparent .5px);
    background-size:22px 22px;
    min-height:100vh;
  }

  /* ---------- HERO ---------- */
  .hero{
    max-width:880px; margin:0 auto; padding:72px 32px 40px;
    text-align:center; position:relative;
  }
  .eyebrow{
    font-family:'Fraunces',serif; font-style:italic; color:var(--accent);
    font-size:1.05rem; margin-bottom:10px;
    animation:rise .7s cubic-bezier(.2,.7,.3,1) backwards; animation-delay:.05s;
  }
  .name{
    font-family:'Fraunces',serif; font-weight:900;
    font-size:clamp(2.6rem,8vw,4.6rem); line-height:1; letter-spacing:-.02em;
    animation:rise .7s cubic-bezier(.2,.7,.3,1) backwards; animation-delay:.12s;
  }
  .role{
    font-size:clamp(1rem,2.6vw,1.25rem); color:var(--ink-soft);
    margin-top:14px; letter-spacing:.01em;
    animation:rise .7s cubic-bezier(.2,.7,.3,1) backwards; animation-delay:.2s;
  }
  .actions{
    margin-top:30px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
    animation:rise .7s cubic-bezier(.2,.7,.3,1) backwards; animation-delay:.28s;
  }
  .btn{
    display:inline-flex; align-items:center; gap:9px;
    padding:13px 26px; border-radius:999px; font-weight:600; font-size:.98rem;
    text-decoration:none; transition:.22s cubic-bezier(.2,.7,.3,1); cursor:pointer;
  }
  .btn-primary{ background:var(--ink); color:var(--paper); }
  .btn-primary:hover{ background:var(--accent); transform:translateY(-2px); box-shadow:0 12px 26px -10px var(--shadow); }
  .btn-ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }

  .contact{
    margin-top:26px; display:flex; gap:8px 22px; justify-content:center; flex-wrap:wrap;
    font-size:.92rem; color:var(--muted);
    animation:rise .7s cubic-bezier(.2,.7,.3,1) backwards; animation-delay:.36s;
  }
  .contact a{ color:var(--muted); text-decoration:none; border-bottom:1px solid var(--line); transition:.2s; }
  .contact a:hover{ color:var(--accent); border-color:var(--accent); }

  /* ---------- PDF VIEWER ---------- */
  .viewer-wrap{
    max-width:880px; margin:24px auto 64px; padding:0 32px;
    animation:rise .8s cubic-bezier(.2,.7,.3,1) backwards; animation-delay:.44s;
  }
  .viewer{
    background:var(--paper-2); border-radius:8px; overflow:hidden;
    box-shadow:0 30px 80px -24px var(--shadow), 0 0 0 1px var(--line);
    height:80vh; min-height:560px;
  }
  .viewer object,.viewer iframe{ width:100%; height:100%; border:0; }
  .fallback{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:14px; padding:40px; text-align:center; color:var(--ink-soft);
  }
  .fallback .btn{ margin-top:6px; }

  @keyframes rise{ from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:none;} }

  @media(max-width:600px){
    .hero{ padding:48px 20px 28px; }
    .viewer-wrap{ padding:0 14px; }
    .viewer{ height:70vh; }
  }
</style>
